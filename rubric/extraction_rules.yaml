# TRIAGE: classify document origin/layout and estimate extraction tier.
triage:
  thresholds:
    low_density_threshold: 0.0002            # Below this char density + high image ratio -> scanned_image.
    high_density_threshold: 0.001            # Above this char density + low image ratio -> native_digital.
    image_heavy_threshold: 0.6               # Minimum image ratio to treat low-density docs as scanned.
    native_digital_max_image_ratio: 0.3      # Max image ratio allowed for native_digital classification.
    max_images_for_ratio: 10                 # Normalizer for image ratio: image_count / max_images_for_ratio.
    target_chars_per_page: 700               # Fast-text confidence calibration target.
    target_density: 0.0015                   # Fast-text confidence calibration target.
    short_line_min_chars: 8                  # Minimum chars for "short line" multi-column heuristic.
    short_line_max_chars: 32                 # Maximum chars for "short line" multi-column heuristic.
    table_heavy_min_pipe_lines: 5            # Pipe-line count threshold for table_heavy layout.
    multi_column_short_line_ratio: 0.45      # Required short-line ratio for multi_column classification.
    multi_column_short_line_min_count: 5     # Minimum short-line count for multi_column classification.
    triage_confidence_base: 0.5              # Base triage confidence score before bonuses.
    triage_confidence_origin_bonus: 0.25     # Added when origin_type is not MIXED.
    triage_confidence_layout_bonus: 0.25     # Added when layout_complexity is not MIXED.
    default_language_confidence: 0.85        # Default language confidence emitted in profile.
  domain_keywords:
    financial: ["revenue", "balance sheet", "income statement", "fiscal", "asset", "liability"]  # Domain hint keywords.
    legal: ["clause", "agreement", "hereby", "party", "statute", "compliance"]                    # Domain hint keywords.
    technical: ["architecture", "implementation", "system", "protocol", "specification"]           # Domain hint keywords.
    medical: ["patient", "diagnosis", "treatment", "clinical", "hospital"]                         # Domain hint keywords.

# EXTRACTION: confidence gate, budget controls, strategy tuning, and escalation policy.
extraction:
  confidence_minimum: 0.65                   # Minimum confidence needed to stop escalation.
  budget_per_document_usd: 2.00              # Hard max estimated spend across all strategies per document.
  enforce_hard_caps: true                    # Enforce preflight and post-run budget checks.
  strategy_budgets_usd:
    fast_text: 0.05                          # Hard cap for strategy A.
    layout_aware: 0.15                       # Hard cap for strategy B.
    vision_augmented: 2.00                   # Hard cap for strategy C.
  strategy_estimated_costs_usd:
    fast_text: 0.002                         # Preflight estimate used before running strategy A.
    layout_aware: 0.02                       # Preflight estimate used before running strategy B.
    vision_augmented: 0.10                   # Preflight estimate used before running strategy C.
  vlm_budget:
    enabled: true                            # Enables/disables vision model execution.
    max_pages_per_document: 120               # Hard page cap for vision processing.
    cost_per_page_usd: 0.01                  # Cost model used for projected/actual VLM spend.
    max_total_cost_usd: 2.00                 # Hard VLM cost cap per document.
    stop_on_budget_exceeded: false            # If true, abort vision when caps are exceeded.
    allow_partial_processing: true          # If true (and stop=false), process only affordable pages.
  fast_text:
    estimated_cost_usd: 0.002                # Returned cost estimate for fast_text strategy.
    confidence_weight_chars: 0.45            # Confidence blend weight for avg chars/page.
    confidence_weight_density: 0.35          # Confidence blend weight for avg char density.
    confidence_weight_image_penalty: 0.20    # Confidence blend weight for image penalty term.
    confidence_weight_font_metadata: 0.10    # Confidence blend weight for font metadata presence signal.
    table_bbox_height_ratio: 0.45            # Height ratio used for detected pipe-table bbox.
    table_min_columns: 3                     # Minimum pipe-separated columns to consider table line.
    table_min_lines: 2                       # Minimum table lines to promote as table.
  layout:
    confidence_if_tables_present: 0.72       # Confidence floor when layout strategy finds tables.
    estimated_cost_usd: 0.02                 # Returned cost estimate for layout strategy.
    adapter:
      provider: both                         # Adapter options: heuristic, docling, mineru, both, docling_mineru, mineru_docling, external_payload.
      options:
        strict: false                        # For docling: raise on adapter failure instead of fallback.
        default_table_bbox_height: 250.0     # Default bbox height used for normalized docling tables.
        default_table_bbox_width: 612.0      # Default bbox width used for normalized external/docling tables.
        payload_json_path: ""                # For external_payload/mineru payload mode: path to JSON table payload file.
  vision:
    confidence_if_text_present_min: 0.9      # Confidence floor when fast text is already available.
    confidence_if_ocr_only: 0.88             # Confidence used when OCR/VLM path is used.
    min_confidence_for_accept: 0.78          # Minimum OCR confidence to accept provider output without fallback.
    escalate_on_low_confidence: true         # If true, try next provider when OCR confidence is low.
    allow_best_effort_on_low_confidence: true # If all providers are below threshold, keep the best result.
    figure_bbox_height: 260.0                # Height used for synthetic vision figure provenance bbox.
    require_model_for_ocr: true              # If true, fail with actionable message when no VLM/LLM is configured.
    strategy_config_path: "rubric/vision_strategy.yaml"  # Dedicated strategy C config file.
    providers:
      - name: "lmstudio_qwen"
        enabled: true
        api_base: "http://192.168.6.233:1234/v1"
        model: "qwen3-vl-32b-instruct"
        api_key_env: "LMSTUDIO_API_KEY"
        max_output_tokens: 700
        temperature: 0.0
      - name: "openai_fallback"
        enabled: false
        api_base: "https://api.openai.com/v1"
        model: "gpt-4o-mini"
        api_key_env: "OPENAI_API_KEY"
        max_output_tokens: 700
        temperature: 0.0
      - name: "gemini_fallback"
        enabled: false
        api_base: "https://generativelanguage.googleapis.com/v1beta/openai"
        model: "gemini-2.0-flash"
        api_key_env: "GEMINI_API_KEY"
        max_output_tokens: 700
        temperature: 0.0
    openrouter:
      enabled: true                           # Enabled by default for local/OpenAI-compatible vision endpoint.
      api_base: "http://192.168.6.233:1234/v1"
      model: "qwen3-vl-32b-instruct"
      api_key_env: "LMSTUDIO_API_KEY"      # API key is read from this environment variable.
      max_output_tokens: 700
      temperature: 0.0
  escalation:
    continue_on_strategy_error: true         # If true, try next strategy when current strategy errors.
    require_human_review_on_low_confidence: true  # If true, low-confidence final output requires review.
    initial_strategy_mode: always_fast_text  # always_fast_text | profile
    chains:
      fast_text: ["fast_text", "layout_aware", "vision_augmented"]  # Strategy order when starting from A.
      layout_aware: ["layout_aware", "vision_augmented"]             # Strategy order when starting from B.
      vision_augmented: ["vision_augmented"]                         # Strategy order when starting from C.

# CHUNKING: controls for LDU generation.
chunking:
  max_tokens: 500                            # Maximum tokens allowed per emitted chunk.
  rules:
    - table_cell_never_split_from_header     # Keep table headers with their cells.
    - figure_caption_stored_with_figure      # Keep figure captions attached to figure chunks.
    - numbered_list_single_ldu_unless_too_large
    - section_header_propagates_to_children
    - cross_references_resolved

# PAGEINDEX: summary generation settings.
pageindex:
  llm_summaries_enabled: true                # If true, attempt cheap LLM section summaries with fallback.
  llm:
    provider: openrouter                     # openrouter | gemini
    enabled: false
    api_base: "http://192.168.6.233:1234/v1" # used for openrouter only
    model: "google/gemma-3-27b"             # or gemini-1.5-flash when provider=gemini
    api_key_env: "LMSTUDIO_API_KEY"       # set to GEMINI_API_KEY if provider=gemini
    max_output_tokens: 140
    temperature: 0.1

# QUERY AGENT: tool-router model configuration.
query_agent:
  router:
    provider: heuristic                      # heuristic | openrouter | gemini
    enabled: false                           # Enable model-based tool routing if true.
    api_base: "http://192.168.6.233:1234/v1" # used for openrouter only
    model: "google/gemma-3-27b"             # or gemini-1.5-flash when provider=gemini
    api_key_env: "LMSTUDIO_API_KEY"       # set to GEMINI_API_KEY if provider=gemini
    max_output_tokens: 250
    temperature: 0.0

# STORAGE: vector backend configuration.
storage:
  vector_store:
    backend: simple                          # simple | faiss
    embedding_dim: 256                       # Used by FAISS hashed-token embeddings.
    similarity: cosine                       # cosine | l2 (FAISS backend)
